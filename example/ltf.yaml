# Use this approach to capture exported variables?
# https://github.com/direnv/direnv/blob/6858d0439d505a77145bf12fd208b57a30578ea7/stdlib.sh#L1272
# run script contents with bash wrapper, print/write out new env and capture it
# use the new env when running terraform

# Maybe allow exporting variables to control things,
# e.g. a hook to change the command:
#   export LTF_COMMAND=terraform plan -target=random_id.this

hooks:
  # script:
  #   before:
  #     - terraform
  #   after:
  #     - terraform
  #   failed:
  #     - terraform
  #   run:
  #     - $LTF_YAML_DIR/hook.sh
  #     - source $LTF_YAML_DIR/hook.sh # souce would enable exporting environment vars
  #   # Provide extra env vars for scripts to use:
  #   # LTF_DIR: current directory (or just use PWD?)
  #   # LTF_TERRAFORM_DIR: terraform configuration directory, same as -chdir (must avoid naming clash with above, both are config dirs)
  #   # LTF_YAML_DIR: ltf configuration directory (where this file lives)
  # info:
  #   # before:
  #   #   - terraform
  #   # after:
  #   #   - terraform
  #   failed:
  #     - terraform
  #   run:
  #     - echo 'Exporting TF_VAR_secrets'
  #     - export TF_VAR_secrets=hello
  secrets:
    before:
      - terraform apply
      - terraform plan
    run:
      # what if secrets.yml is in a parent directory? how to find it?
      # - if test -f secrets.yml; then echo TF_VAR_secrets=$(cat secrets.yml | base64); fi
      - echo 'Exporting TF_VAR_secrets'
      - export TF_VAR_secrets=hello 
      - env | grep TF
  # broken:
