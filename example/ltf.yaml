# Idea: Provide useful environment variables like LTF_TERRAFORM_CMD, LTF_TERRAFORM_DIR, LTF_YAML_DIR.
# IDEA: Provide useful functions like ltf_find()
# Idea: Read those environment variables after hooks run, and alter what LTF does accordingly, allowing hooks to alter behaviour more.
# Idea: Allow hooks to run INSTEAD of the terraform command, e.g. "ltf sops" to run sops to edit them, allowing for custom non-Terraform commands.
# Idea Better command matching, e.g. `terraform plan|apply`
# Problem: What if secrets.yaml is in an intermediate directory? How should a hook find it? Include a bash function library for it?

hooks:
  edit secrets:
    before:
      - terraform sops
    run:
      - |
        ltf_find () { echo $1; } # TODO: provide this function?
        file=$(ltf_find "secrets.yaml")
        if [[ "${file}" == "" ]]; then
          echo "Could not find secrets.yaml"
          exit 1
        else
          export "LTF_TERRAFORM_CMD=sops ${file}"
        fi
      - 'echo LTF_TERRAFORM_CMD=$LTF_TERRAFORM_CMD' # TODO: use this to alter what LTF will run? or run it directly and use another special env var to stop?
  offer condolences:
    failed:
      - terraform sops
    run:
      - echo '      Sorry, this is still a work in progress.'
  export secrets:
    before:
      - terraform apply
      - terraform plan
    run:
      # TODO: this would use sops, maybe using ltf_find() function
      - export TF_VAR_secrets=hello
      - echo '      TF_VAR_secrets=(sensitive value)'
